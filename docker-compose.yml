services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootroot
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootroot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - metaarch-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.1.4
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - metaarch-network

  logstash:
    image: docker.elastic.co/logstash/logstash:9.1.4
    container_name: logstash
    environment:
      LS_JAVA_OPTS: -Xms256m -Xmx256m
    ports:
      - "5000:5000"
      - "9600:9600"
    volumes:
      - ./docker/logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch
    networks:
      - metaarch-network

  kibana:
    image: docker.elastic.co/kibana/kibana:9.1.4
    container_name: kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - metaarch-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - metaarch-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - metaarch-network

  metaarch-eureka-server:
    build:
      context: ./metaarch-eureka-server
    image: metaarch-eureka-server:local
    container_name: metaarch-eureka-server
    environment:
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000
      LOG_ENV: docker
    ports:
      - "8761:8761"
    depends_on:
      - logstash
    networks:
      - metaarch-network

  metaarch-config-server:
    build:
      context: ./metaarch-config-server
    image: metaarch-config-server:local
    container_name: metaarch-config-server
    environment:
      EUREKA_SERVER_URL: http://metaarch-eureka-server:8761/eureka
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: rootroot
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000
      LOG_ENV: docker
    ports:
      - "8888:8888"
    depends_on:
      - logstash
      - metaarch-eureka-server
    networks:
      - metaarch-network

  metaarch-api-gateway:
    build:
      context: ./metaarch-api-gateway
    image: metaarch-api-gateway:local
    container_name: metaarch-api-gateway
    environment:
      SERVER_PORT: 8082
      CONFIG_SERVER_URL: http://metaarch-config-server:8888
      EUREKA_SERVER_URL: http://metaarch-eureka-server:8761/eureka
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000
      LOG_ENV: docker
    ports:
      - "8082:8082"
    depends_on:
      - logstash
      - metaarch-config-server
      - metaarch-eureka-server
    networks:
      - metaarch-network

  org-access:
    build:
      context: ./org-access
    image: org-access:local
    container_name: org-access
    environment:
      SERVER_PORT: 8083
      CONFIG_SERVER_URL: http://metaarch-config-server:8888
      EUREKA_SERVER_URL: http://metaarch-eureka-server:8761/eureka
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: rootroot
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000
      LOG_ENV: docker
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      logstash:
        condition: service_started
      metaarch-config-server:
        condition: service_started
      metaarch-eureka-server:
        condition: service_started
    networks:
      - metaarch-network

  booking-system:
    build:
      context: ./BokingSysem
    image: booking-system:local
    container_name: booking-system
    environment:
      SERVER_PORT: 8086
      CONFIG_SERVER_URL: http://metaarch-config-server:8888
      EUREKA_SERVER_URL: http://metaarch-eureka-server:8761/eureka
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: rootroot
      SPRING_AUTOCONFIGURE_EXCLUDE: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000
      LOG_ENV: docker
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      logstash:
        condition: service_started
      metaarch-config-server:
        condition: service_started
      metaarch-eureka-server:
        condition: service_started
    networks:
      - metaarch-network

networks:
  metaarch-network:
    name: metaarch-network

volumes:
  mysql-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:
