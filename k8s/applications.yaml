      port: 8086
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-system
  namespace: metaarch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-system
  template:
    metadata:
      labels:
        app: booking-system
    spec:
      containers:
        - name: booking-system
