apiVersion: v1
kind: Service
metadata:
  name: metaarch-eureka-server
  namespace: metaarch
spec:
  selector:
    app: metaarch-eureka-server
  ports:
    - name: http
      port: 8761
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metaarch-eureka-server
  namespace: metaarch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metaarch-eureka-server
  template:
    metadata:
      labels:
        app: metaarch-eureka-server
    spec:
      containers:
        - name: metaarch-eureka-server
          image: metaarch-eureka-server:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8761
          envFrom:
            - configMapRef:
                name: metaarch-config
          startupProbe:
            httpGet: {path: /actuator/health, port: http}
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet: {path: /actuator/health, port: http}
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: {path: /actuator/health, port: http}
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests: {cpu: 200m, memory: 384Mi}
            limits: {memory: 768Mi}
---
