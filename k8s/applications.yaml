apiVersion: v1
kind: Service
metadata:
  name: metaarch-api-gateway
  namespace: metaarch
spec:
  type: NodePort
  selector:
    app: metaarch-api-gateway
  ports:
    - name: http
      port: 8082
      targetPort: http
      nodePort: 30082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metaarch-api-gateway
  namespace: metaarch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metaarch-api-gateway
  template:
    metadata:
      labels:
        app: metaarch-api-gateway
    spec:
      containers:
        - name: metaarch-api-gateway
          image: metaarch-api-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
          env:
            - name: SERVER_PORT
              value: "8082"
            # Do not start the gateway without its externally managed routes.
            # Kubernetes will retry the container until Config Server is ready.
            - name: SPRING_CONFIG_IMPORT
              value: configserver:http://metaarch-config-server:8888
          envFrom:
            - configMapRef: {name: metaarch-config}
          startupProbe:
            httpGet: {path: /actuator/health, port: http}
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet: {path: /actuator/health, port: http}
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: {path: /actuator/health, port: http}
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests: {cpu: 200m, memory: 384Mi}
            limits: {memory: 768Mi}
---
