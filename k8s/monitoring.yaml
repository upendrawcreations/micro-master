apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: metaarch
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: spring-boot-services
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - metaarch-eureka-server:8761
              - metaarch-config-server:8888
              - metaarch-api-gateway:8082
              - org-access:8083
              - booking-system:8086
              - alerts-service:8087
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: metaarch
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: metaarch
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
      nodePort: 30090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: metaarch
spec:
  replicas: 1
  selector:
    matchLabels: {app: prometheus}
  template:
    metadata:
      labels: {app: prometheus}
    spec:
      securityContext:
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            httpGet: {path: /-/ready, port: http}
            initialDelaySeconds: 10
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {memory: 512Mi}
          volumeMounts:
            - {name: config, mountPath: /etc/prometheus/prometheus.yml, subPath: prometheus.yml, readOnly: true}
            - {name: data, mountPath: /prometheus}
      volumes:
        - name: config
          configMap: {name: prometheus-config}
        - name: data
          persistentVolumeClaim: {claimName: prometheus-data}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: metaarch
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: metaarch
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: metaarch
spec:
  type: NodePort
  selector: {app: grafana}
  ports:
    - name: http
      port: 3000
      targetPort: http
      nodePort: 30001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: metaarch
spec:
  replicas: 1
  selector:
    matchLabels: {app: grafana}
  template:
    metadata:
      labels: {app: grafana}
    spec:
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom: {secretKeyRef: {name: metaarch-secrets, key: GF_SECURITY_ADMIN_USER}}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom: {secretKeyRef: {name: metaarch-secrets, key: GF_SECURITY_ADMIN_PASSWORD}}
            - {name: GF_USERS_ALLOW_SIGN_UP, value: "false"}
          readinessProbe:
            httpGet: {path: /api/health, port: http}
            initialDelaySeconds: 10
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {memory: 512Mi}
          volumeMounts:
            - {name: data, mountPath: /var/lib/grafana}
            - {name: datasources, mountPath: /etc/grafana/provisioning/datasources/prometheus.yml, subPath: prometheus.yml, readOnly: true}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: grafana-data}
        - name: datasources
          configMap: {name: grafana-datasources}
