apiVersion: v1
kind: ConfigMap
metadata:
  name: metaarch-config
  namespace: metaarch
data:
  EUREKA_SERVER_URL: http://metaarch-eureka-server:8761/eureka
  # Pod hostnames are not DNS records; advertise routable pod IPs to clients.
  EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
  CONFIG_SERVER_URL: http://metaarch-config-server:8888
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  MAIL_HOST: smtp.gmail.com
  MAIL_PORT: "587"
  MAIL_FROM: alerts@example.com
  MYSQL_HOST: mysql
  MYSQL_PORT: "3306"
  LOGSTASH_HOST: logstash
  LOGSTASH_PORT: "5000"
  LOG_ENV: kubernetes
---
apiVersion: v1
kind: Secret
metadata:
  name: metaarch-secrets
  namespace: metaarch
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: rootroot
  MYSQL_USERNAME: root
  MYSQL_PASSWORD: rootroot
  GF_SECURITY_ADMIN_USER: admin
  GF_SECURITY_ADMIN_PASSWORD: admin
  MAIL_USERNAME: replace-with-smtp-username
  MAIL_PASSWORD: replace-with-smtp-app-password
  JWT_SECRET: change-this-secret-to-a-long-random-string
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
  namespace: metaarch
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS `Layout`;
    CREATE DATABASE IF NOT EXISTS `users_roles`;
