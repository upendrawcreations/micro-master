apiVersion: v1
kind: ConfigMap
metadata:
  name: metaarch-config
  namespace: metaarch
data:
  EUREKA_SERVER_URL: http://metaarch-eureka-server:8761/eureka
  # Pod hostnames are not DNS records; advertise routable pod IPs to clients.
  EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
  CONFIG_SERVER_URL: http://metaarch-config-server:8888
  MYSQL_HOST: mysql
  MYSQL_PORT: "3306"
  LOGSTASH_HOST: logstash
  LOGSTASH_PORT: "5000"
  LOG_ENV: kubernetes
---
apiVersion: v1
kind: Secret
metadata:
  name: metaarch-secrets
  namespace: metaarch
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: rootroot
  MYSQL_USERNAME: root
  MYSQL_PASSWORD: rootroot
  GF_SECURITY_ADMIN_USER: admin
  GF_SECURITY_ADMIN_PASSWORD: admin
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
  namespace: metaarch
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS `Layout`;
    CREATE DATABASE IF NOT EXISTS `users_roles`;
